# This is a basic workflow that is manually triggered

name: AutoDoc API

# Controls when the action will run.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'update-feed-alpha-net472.json'

permissions:
  contents: write

jobs:
  rebuild_docs:
    runs-on: windows-latest
    
    steps:
    # Checkout the repository (without LFS)
    - name: Checkout website repo
      uses: actions/checkout@v3
      with:
        path: website_repo
    
    # Get latest version information from the net472 update feed
    - name: Get latest version information
      id: get_version
      run: |
        $feedPath = "website_repo/update-feed-alpha-net472.json"
        $feed = Get-Content -Path $feedPath | ConvertFrom-Json
        $version = $feed.version
        $tag = $feed.tag
        $baseUrl = $feed.baseUrl
        $portableUrl = "$baseUrl" + "uo-copilot-net472-alpha-Portable.zip"
        Write-Host "Latest version: $version"
        Write-Host "Tag: $tag"
        Write-Host "Portable URL: $portableUrl"
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "tag=$tag" >> $env:GITHUB_OUTPUT
        echo "portable_url=$portableUrl" >> $env:GITHUB_OUTPUT
      shell: pwsh

    # Download the Portable zip from the GitHub release
    - name: Download Portable ZIP
      run: |
        $portableUrl = "${{ steps.get_version.outputs.portable_url }}"
        $outputFile = "uo-copilot-portable.zip"
        Write-Host "Downloading $portableUrl to $outputFile"
        Invoke-WebRequest -Uri $portableUrl -OutFile $outputFile
      shell: pwsh

    # Extract the Portable zip
    - name: Extract ZIP file
      run: |
        New-Item -ItemType Directory -Path "extracted" -Force
        $outputFile = "uo-copilot-portable.zip"
        Write-Host "Extracting ZIP: $outputFile"
        7z x $outputFile -o"./extracted"
      shell: pwsh

    - name: Display extracted files
      run: dir extracted

    # Run the UO-CoPilot portable exe to generate AutoComplete.json
    # --autoDocsOnly writes to ExeDirectory/Config/AutoComplete.json
    - name: Run UO-CoPilot --autoDocsOnly
      run: |
        cd extracted\current
        .\uo-copilot-net472.exe --autoDocsOnly
        dir Config\AutoComplete.json
      shell: cmd

    # Generate HTML docs from AutoComplete.json using autodoc.py from the repo
    # autodoc.py reads ./Config/AutoComplete.json and writes to ./doc/api/
    - name: Run autodoc.py
      run: |
        cd extracted\current
        Copy-Item "..\..\website_repo\doc\autodoc.py" -Destination "." -Force
        python autodoc.py
      shell: pwsh

    # Copy generated docs back to the repository
    - name: Update repo documentation
      run: |
        Copy-Item -Path "extracted/current/doc/*" -Destination "website_repo/doc/" -Recurse -Force -Verbose
      shell: pwsh

    # Commit changes
    - name: Commit
      run: |
        cd website_repo
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add doc/
        git commit -m "GitHub Actions build_docs" || echo "No changes to commit"
      shell: pwsh

    # Push changes using dedicated action
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        directory: website_repo
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: main