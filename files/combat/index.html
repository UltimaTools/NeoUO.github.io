<!DOCTYPE html>
<html>
<head>
    <title>UO-Copilot - Combat Files</title>
    <link rel="stylesheet" href="/neouo/css/style.css">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 40px;
            background: black;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }
        
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .content {
            position: relative;
            z-index: 1;
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        .nav { 
            margin: 20px 0; 
        }
        
        .nav a { 
            display: block; 
            margin: 10px 0;
            padding: 10px;
            background: rgba(0, 255, 0, 0.1);
            text-decoration: none;
            color: #0f0;
            border-radius: 4px;
            border: 1px solid #0f0;
            transition: all 0.3s ease;
        }
        
        h1, h2 { 
            color: #0f0;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        a {
            color: #0f0;
        }

        .file-list {
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 5px;
            border: 1px solid #0f0;
        }

        .file-entry {
            margin: 10px 0;
            padding: 10px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 4px;
        }

        .file-entry a {
            text-decoration: none;
            color: #0f0;
        }

        .file-entry a:hover {
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.7);
        }

        .upload-form {
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 5px;
            border: 1px solid #0f0;
        }

        .button {
            background: rgba(0, 255, 0, 0.2);
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .button:hover {
            background: rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
    </style>
    <script>
        function loadFileList() {
            const category = window.location.pathname.split('/').filter(p => p).pop();
            const listUrl = `/neouo/files/${category}/files/`;
            console.log('Fetching from:', listUrl);

            fetch(listUrl)
                .then(response => {
                    console.log('Response status:', response.status);
                    return response.text();
                })
                .then(html => {
                    console.log('Raw HTML:', html);
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const files = Array.from(doc.getElementsByTagName('a'))
                        .filter(a => !a.textContent.startsWith('.'))
                        .map(a => {
                            const fileName = a.textContent.trim();
                            const fileUrl = `${listUrl}${fileName}`;
                            console.log('Processing file:', fileUrl);
                            return `<div class="file-entry">
                                <a href="${fileUrl}" download>${fileName}</a>
                            </div>`;
                        }).join('');
                    document.getElementById('file-listing').innerHTML = files || 'No files available';
                })
                .catch(error => {
                    console.error('Fetch error:', error);
                    document.getElementById('file-listing').innerHTML = 'Error loading files';
                });
        }
    </script>
</head>
<body onload="loadFileList()">
    <canvas id="matrix-bg"></canvas>
    <div class="content">
        <h1>Combat Files</h1>
        <div class="nav">
            <a href="/">Back to Main Page</a>
        </div>
        <div class="upload-form">
            <h3>Upload New File</h3>
            <form action="/neouo/files/upload.php" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="category" value="combat">
                <input type="file" name="file" required>
                <input type="submit" value="Upload" class="button">
            </form>
        </div>
        <div class="file-list">
            <h3>Available Files</h3>
            <div id="file-listing">Loading files...</div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';
        const fontSize = 14;
        const columns = canvas.width/fontSize;
        const drops = [];

        for(let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        let isAnimating = true;
        let finalFrame = null;

        function draw() {
            if (!isAnimating) {
                if (finalFrame) {
                    ctx.putImageData(finalFrame, 0, 0);
                }
                return;
            }

            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for(let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }

                drops[i]++;
            }
        }

        const animationInterval = setInterval(draw, 33);

        setTimeout(() => {
            isAnimating = false;
            clearInterval(animationInterval);
            finalFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }, 10);
    </script>
</body>
</html>
